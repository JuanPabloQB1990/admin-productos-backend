name: Node.js TypeScript API - CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # GitHub necesita saber a qué base de datos conectarse en su entorno
  DATABASE_URL: mysql://root:Juanpablo1990@127.0.0.1:3306/productsadmin
  DATABASE_URL_TEST: mysql://root:Juanpablo1990@127.0.0.1:3306/productsadmintest
  PORT: 5000

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
